name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (example: v1.2.3)'
        required: false
        type: string
      skip_publish:
        description: 'Build release artifacts but skip publishing'
        required: false
        default: false
        type: boolean
      snapshot:
        description: 'Run GoReleaser in snapshot mode'
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write

env:
  GO_VERSION: "1.26"

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.mode.outputs.publish }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: |
          go mod download
          go mod verify
          go test -v ./...

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Verify Docker Buildx
        run: docker buildx ls

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Resolve release mode
        id: mode
        env:
          INPUT_SKIP_PUBLISH: ${{ github.event.inputs.skip_publish }}
          INPUT_SNAPSHOT: ${{ github.event.inputs.snapshot }}
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          SHOULD_PUBLISH=true
          if [[ "${INPUT_SKIP_PUBLISH:-false}" == "true" || "${INPUT_SNAPSHOT:-false}" == "true" ]]; then
            SHOULD_PUBLISH=false
          fi

          if [[ "$TAG_NAME" == *-alpha* || "$TAG_NAME" == *-beta* || "$TAG_NAME" == *-rc* ]]; then
            SHOULD_PUBLISH=false
          fi

          ARGS="release --clean --config .goreleaser.yaml"
          if [[ "$SHOULD_PUBLISH" != "true" ]]; then
            ARGS="$ARGS --skip=publish"
          fi
          if [[ "${INPUT_SNAPSHOT:-false}" == "true" ]]; then
            ARGS="$ARGS --snapshot"
          fi

          echo "publish=$SHOULD_PUBLISH" >> "$GITHUB_OUTPUT"
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Validate publish credentials
        if: ${{ steps.mode.outputs.publish == 'true' }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "::error::Missing HOMEBREW_TAP_TOKEN secret. It is required to publish the Homebrew cask."
            exit 1
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: ${{ steps.mode.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          WINGET_GITHUB_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: dist/*
          retention-days: 30

  verify:
    name: Verify published release
    needs: release
    if: ${{ needs.release.outputs.published == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify GitHub release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release view "$TAG" --repo "${{ github.repository }}"

      - name: Verify Homebrew tap cask was updated
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"

          CASK_CONTENT="$({
            gh api repos/entro314-labs/homebrew-tap/contents/Casks/devkill.rb?ref=main --jq '.content' \
              | tr -d '\n' \
              | base64 --decode;
          })"

          grep -q "version \"$VERSION\"" <<< "$CASK_CONTENT"

      - name: Verify go install
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          go install github.com/${{ github.repository }}@${TAG}
          "$(go env GOPATH)/bin/devkill" --list-targets | head -n 1

      - name: Verify Docker image
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          docker pull ghcr.io/${{ github.repository }}:${TAG}
          docker run --rm ghcr.io/${{ github.repository }}:${TAG} --list-targets | head -n 1