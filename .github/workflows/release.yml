# Release Workflow — devkill
# Triggers on version tags (v*.*.*) and creates GitHub releases
# Includes Cosign signing and post-release verification

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: false
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

env:
  GO_VERSION: "1.26"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: |
          go mod download
          go mod verify
          go test -v ./...

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4
          platforms: linux/amd64,linux/arm64

      - name: Verify buildx setup
        env:
          BUILDER_NAME: ${{ steps.buildx.outputs.name }}
        run: |
          docker buildx ls
          docker run --privileged --rm tonistiigi/binfmt --install all
          echo "BUILDER_NAME=${BUILDER_NAME}" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0.24.0

     # - name: Install Cosign
     #   uses: sigstore/cosign-installer@v4.1.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
          AUR_KEY: ${{ secrets.AUR_KEY }}
         # COSIGN_PWD: ${{ secrets.COSIGN_PWD }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: dist/*
          retention-days: 30

  verify:
    name: Verify Release
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Wait for release propagation
        run: sleep 30

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          echo "Checking release for tag: ${TAG}"
          gh release view "${TAG}" --repo "${REPO}"

      - name: Test installation (Go)
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          go install "github.com/${REPO}@${TAG}"
          devkill --version

      - name: Test Docker image
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          docker pull "ghcr.io/${REPO}:${VERSION}"
          docker run --rm "ghcr.io/${REPO}:${VERSION}" --version
        continue-on-error: true
